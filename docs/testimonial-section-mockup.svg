<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#0F1B2D"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="420" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F2138" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#102741" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7FE6D4"/>
      <stop offset="1" stop-color="#B7F3DF"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="520" height="380" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="1180" cy="120" r="180" fill="#11304A" fill-opacity="0.35"/>
  <circle cx="180" cy="760" r="220" fill="#0C2A3C" fill-opacity="0.3"/>

  <text x="110" y="130" fill="#87F0DD" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="4">REAL LEARNER MOMENTUM</text>
  <text x="110" y="205" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">What learners are saying</text>
  <text x="110" y="250" fill="#96A6BD" font-family="Segoe UI, Arial, sans-serif" font-size="24">Real stories from learners who moved from random effort to structured growth.</text>

  <rect x="110" y="320" rx="30" ry="30" width="1180" height="470" fill="#0B1627" fill-opacity="0.42" stroke="#1E3149"/>

  <g filter="url(#shadow)">
    <rect x="150" y="370" width="340" height="255" rx="28" fill="url(#card)" stroke="#1C3550"/>
  </g>
  <rect x="180" y="400" width="126" height="34" rx="17" fill="#153A41"/>
  <text x="205" y="422" fill="#9EF3DE" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Career Clarity</text>
  <text x="180" y="470" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">ōI stopped wasting time</text>
  <text x="180" y="507" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">deciding what to study</text>
  <text x="180" y="544" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">next. The roadmap solved</text>
  <text x="180" y="581" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">that for me.ö</text>
  <text x="180" y="657" fill="#C9D5E3" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Aditi Verma</text>
  <text x="180" y="685" fill="#93A4BC" font-family="Segoe UI, Arial, sans-serif" font-size="16">Bhopal Ģ Java Developer Ģ 2 days ago</text>

  <g filter="url(#shadow)">
    <rect x="530" y="340" width="340" height="280" rx="28" fill="url(#card)" stroke="#274761"/>
  </g>
  <rect x="560" y="370" width="118" height="34" rx="17" fill="#3A2D1A"/>
  <text x="585" y="392" fill="#F6D28B" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Resume Boost</text>
  <text x="560" y="440" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">ōMy resume was weak</text>
  <text x="560" y="477" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">earlier. After improving it</text>
  <text x="560" y="514" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">here, I started getting</text>
  <text x="560" y="551" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">more interview calls.ö</text>
  <text x="560" y="642" fill="#C9D5E3" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Karan Mehta</text>
  <text x="560" y="670" fill="#93A4BC" font-family="Segoe UI, Arial, sans-serif" font-size="16">Delhi Ģ Backend Developer Ģ 5 days ago</text>

  <g filter="url(#shadow)">
    <rect x="910" y="395" width="340" height="245" rx="28" fill="url(#card)" stroke="#1C3550"/>
  </g>
  <rect x="940" y="425" width="110" height="34" rx="17" fill="#33214B"/>
  <text x="968" y="447" fill="#DBB3FF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Consistency</text>
  <text x="940" y="495" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">ōThe best part is not</text>
  <text x="940" y="532" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">the resources, itÆs the</text>
  <text x="940" y="569" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">structure. I finally feel</text>
  <text x="940" y="606" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">consistent.ö</text>
  <text x="940" y="675" fill="#C9D5E3" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Nikita Singh</text>
  <text x="940" y="703" fill="#93A4BC" font-family="Segoe UI, Arial, sans-serif" font-size="16">Lucknow Ģ Data Analyst Ģ 1 week ago</text>

  <rect x="150" y="735" width="240" height="14" rx="7" fill="#14253A"/>
  <rect x="150" y="735" width="110" height="14" rx="7" fill="url(#accent)"/>
  <text x="410" y="747" fill="#8BA0B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">slow trust feed</text>
</svg>
